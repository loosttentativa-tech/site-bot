<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAVALEIRO BOT - Alugue um bot para seu grupo</title>

<link rel="icon" type="image/jpg" href="https://storageblack.cloud/midia/1773117490092.jpg">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#050505,#0b0b0b,#111);
color:white;
overflow-x:hidden;
position:relative;
}

/* PARTICULAS */
#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-2;
}

/* NAVBAR */
nav{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:rgba(11,11,11,0.8);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
text-transform:uppercase;
background:linear-gradient(to right,#fff,#888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* HERO */
.hero{
height:80vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:clamp(32px,8vw,60px);
font-weight:900;
margin-bottom:20px;
}

.hero p{
color:#aaa;
font-size:1.2rem;
margin-bottom:30px;
max-width:600px;
}

.hero-btns {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

/* BOTÕES GERAIS */
.btn,.botao{
padding:14px 35px;
background:white;
color:black;
border-radius:8px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
border:1px solid white;
display:inline-block;
cursor:pointer;
}

.btn.outline {
    background: transparent;
    color: white;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,255,255,0.3);
background: white;
color: black;
}

/* MODAL BASE */
.modal {
    display: none; 
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.92);
    backdrop-filter: blur(15px);
    overflow-y: auto;
}

.modal-content {
    margin: 5% auto;
    padding: 40px 20px;
    width: 95%;
    max-width: 1100px;
    background: rgba(10, 10, 10, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    position: relative;
    animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes slideIn {
    from {opacity: 0; transform: translateY(50px);}
    to {opacity: 1; transform: translateY(0);}
}

.close-modal {
    position: absolute;
    right: 25px;
    top: 10px;
    font-size: 40px;
    cursor: pointer;
    color: #555;
    transition: 0.3s;
}

.close-modal:hover { color: #ff4444; }

/* GRID DE FUNÇÕES */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.card-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 30px;
    border-radius: 20px;
    transition: 0.3s;
}

.card-item:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.3);
}

.card-item h3 { margin-bottom: 10px; color: #fff; }
.card-item p { color: #888; font-size: 14px; }

/* GRID DE PLANOS */
.planos-grid{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
gap: 20px;
margin-top: 40px;
}

.plano{
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.1);
padding: 30px 20px;
border-radius: 20px;
text-align: center;
transition: all 0.4s ease;
position: relative;
overflow: hidden;
}

.plano:hover {
    transform: translateY(-10px);
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
}

.plano.destaque {
    border: 2px solid #ffd700;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
}

.plano.destaque::before {
    content: "MAIS VENDIDO";
    position: absolute;
    top: 12px;
    right: -35px;
    background: #ffd700;
    color: black;
    font-size: 10px;
    font-weight: 900;
    padding: 5px 40px;
    transform: rotate(45deg);
}

.preco{
font-size: 48px;
font-weight: 800;
margin: 15px 0;
background: linear-gradient(to bottom, #fff, #aaa);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.beneficios { list-style: none; color: #888; font-size: 14px; line-height: 2.2; margin-bottom: 25px; }

.botao-plano {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    display: block;
    background: white;
    color: black;
}

/* WHATSAPP & MUSICA */
.zap, .music-control {
position:fixed;
bottom:30px;
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
transition:0.3s;
}

.zap{
right:30px;
background:linear-gradient(135deg,#25D366,#128C7E);
color:white;
width:65px;
height:65px;
text-decoration:none;
font-size:30px;
box-shadow:0 10px 30px rgba(37,211,102,0.5);
animation:zapPulse 2s infinite;
}

.music-control{
left:30px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
color:white;
width:50px;
height:50px;
}

@keyframes zapPulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,0.7);}
70%{box-shadow:0 0 0 15px rgba(37,211,102,0);}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

footer{padding:40px; text-align:center; color:#555; border-top:1px solid #111;}

</style>
</head>

<body>

<div id="particles-js"></div>

<nav>
<div class="logo">CAVALEIRO BOT</div>
</nav>

<section class="hero">
<h1>ALUGUE JÁ O CAVALEIRO BOT!
